services:
  web:
    profiles:
      - static-web

  frontend-dev:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.19.0 --activate && pnpm install && pnpm dev --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules

  rest-api:
    build:
      target: dev
    environment:
      APP_ENV: dev
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost:8000}
    ports:
      - "${REST_API_PORT:-8000}:80"
    volumes:
      - ../rest-api:/app
      - rest_api_vendor:/app/vendor
      - jwt_keys:/app/config/jwt
      - rest_api_var:/app/var

  rest-api-migrate:
    build:
      target: dev
    environment:
      APP_ENV: dev
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost:8000}
    volumes:
      - ../rest-api:/app
      - rest_api_vendor:/app/vendor
      - jwt_keys:/app/config/jwt
      - rest_api_var:/app/var

  schedule:
    build:
      target: dev
    command: ["go", "run", "."]
    ports:
      - "${SCHEDULE_SERVICE_PORT:-8081}:8081"
    volumes:
      - ../services/schedule:/app
      - go_build_cache:/root/.cache/go-build
      - go_mod_cache:/go/pkg/mod

volumes:
  frontend_node_modules:
  rest_api_vendor:
  go_build_cache:
  go_mod_cache:
