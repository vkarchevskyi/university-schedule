name: university-schedule

services:
  web:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      target: prod
    environment:
      SERVER_NAME: ${SERVER_NAME:-:80}
    depends_on:
      rest-api:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  rest-api:
    build:
      context: ..
      dockerfile: docker/rest-api/Dockerfile
      target: prod
    env_file:
      - ../rest-api/.env.example
      - path: ../rest-api/.env.local
        required: false
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-change-me}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:-app}:${RABBITMQ_DEFAULT_PASS:-!ChangeMe!}@rabbitmq:5672/${RABBITMQ_DEFAULT_VHOST:-app}"
      SCHEDULE_GENERATION_QUEUE: ${SCHEDULE_GENERATION_QUEUE:-schedule_generation}
      EXAM_SCHEDULE_GENERATION_QUEUE: ${EXAM_SCHEDULE_GENERATION_QUEUE:-exam_schedule_generation}
      TELEGRAM_NOTIFICATIONS_QUEUE: ${TELEGRAM_NOTIFICATIONS_QUEUE:-telegram_notifications}
      WEBSOCKET_TICKET_SECRET: ${WEBSOCKET_TICKET_SECRET:-change-me}
      SCHEDULE_SERVICE_URL: "http://schedule:8081"
      EXAM_CONSULTATION_DAYS_BEFORE: ${EXAM_CONSULTATION_DAYS_BEFORE:-1}
      EXAM_MIN_DAYS_BETWEEN_GROUP_EXAMS: ${EXAM_MIN_DAYS_BETWEEN_GROUP_EXAMS:-1}
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change-me}
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN:-^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$}"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rest-api-migrate:
        condition: service_completed_successfully
    expose:
      - "80"
    volumes:
      - jwt_keys:/app/config/jwt
      - rest_api_var:/app/var

  rest-api-migrate:
    build:
      context: ..
      dockerfile: docker/rest-api/Dockerfile
      target: prod
    command: ["php", "bin/console", "doctrine:migrations:migrate", "--no-interaction"]
    restart: "no"
    env_file:
      - ../rest-api/.env.example
      - path: ../rest-api/.env.local
        required: false
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-change-me}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change-me}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - jwt_keys:/app/config/jwt
      - rest_api_var:/app/var

  schedule:
    build:
      context: ..
      dockerfile: docker/schedule/Dockerfile
      target: prod
    env_file:
      - ../services/schedule/.env.example
      - path: ../services/schedule/.env
        required: false
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?sslmode=disable"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:-app}:${RABBITMQ_DEFAULT_PASS:-!ChangeMe!}@rabbitmq:5672/${RABBITMQ_DEFAULT_VHOST:-app}"
      SCHEDULE_SERVICE_ADDRESS: ":8081"
      WEBSOCKET_TICKET_SECRET: ${WEBSOCKET_TICKET_SECRET:-change-me}
      GENERATION_NOTIFICATIONS_QUEUE: ${GENERATION_NOTIFICATIONS_QUEUE:-generation_notifications}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rest-api-migrate:
        condition: service_completed_successfully
    expose:
      - "8081"

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION:-3.13}-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-!ChangeMe!}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-app}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  caddy_data:
  caddy_config:
  database_data:
  redis_data:
  rabbitmq_data:
  jwt_keys:
  rest_api_var:
