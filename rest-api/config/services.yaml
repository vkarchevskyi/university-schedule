# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    schedule_service_url_default: 'http://127.0.0.1:8081'
    rabbitmq_url_default: 'amqp://app:!ChangeMe!@127.0.0.1:5672/app'
    schedule_generation_queue_default: 'schedule_generation'
    exam_consultation_days_before_default: 1
    exam_min_days_between_group_exams_default: 1

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\ScheduleValidation\ScheduleValidationClientInterface:
        alias: App\Service\ScheduleValidation\HttpScheduleValidationClient

    App\Service\ScheduleGeneration\ScheduleGenerationPublisherInterface:
        alias: App\Service\ScheduleGeneration\AmqpScheduleGenerationPublisher

    App\Service\ScheduleGeneration\AmqpScheduleGenerationPublisher:
        arguments:
            $rabbitmqUrl: '%env(default:rabbitmq_url_default:RABBITMQ_URL)%'
            $queueName: '%env(default:schedule_generation_queue_default:SCHEDULE_GENERATION_QUEUE)%'

    App\Service\ExamScheduleValidation\ValidateExamScheduleRulesService:
        arguments:
            $consultationDaysBefore: '%env(int:default:exam_consultation_days_before_default:EXAM_CONSULTATION_DAYS_BEFORE)%'
            $minimumDaysBetweenGroupExams: '%env(int:default:exam_min_days_between_group_exams_default:EXAM_MIN_DAYS_BETWEEN_GROUP_EXAMS)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
